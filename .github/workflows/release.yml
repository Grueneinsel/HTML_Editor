name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build dist/index.html
        run: python3 bundler.py

      - name: Get short commit SHA and date
        id: meta
        run: |
          echo "short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Rename dist file
        run: cp dist/index.html "dist/Arbonotate_${{ steps.meta.outputs.date }}.html"

      - name: Delete existing 'latest' release and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Arbonotate – latest (${{ steps.meta.outputs.short }})"
          body: |
            Automatically built from the latest commit on `main`.

            **Standalone HTML file** — no installation, no server, no internet connection required.

            ### Download & use
            1. Download **`index.html`** below
            2. Open it in any modern browser
            3. Done — all features work offline

            ---

            ### Features

            | Feature | Description |
            |---------|-------------|
            | **Multi-project management** | Any number of projects with their own files, annotations, and undo stack |
            | **CoNLL-U comparison** | Token-by-token diff of multiple files against a Gold annotation |
            | **Interactive tree** | Dependency trees with drag-and-drop arcs, relation selector, ROOT drop zone |
            | **Gold annotation** | Via click, popup, or keyboard shortcuts — custom values override file values |
            | **CoNLL-U editor** | Structured editor and raw textarea per file |
            | **Undo/Redo** | Up to 80 steps per project, saved with session |
            | **Session export** | Save and load complete working state as JSON |
            | **Autosave** | Working state saved every 30 seconds, restored automatically |
            | **Tagset configuration** | Custom DEPREL, UPOS/XPOS, and dependency layers via JSON |
            | **Export** | Gold CoNLL-U and tree view for all projects |
            | **Guided Tour** | Interactive introduction with spotlight and tooltips |
            | **Keyboard shortcuts** | Full operation without mouse |
            | **Multi-language** | English / German — add more via `lang/xx.js` |
            | **Tablet support** | Touch-optimised, draggable arcs, larger tap targets |

            → [Full documentation](https://github.com/Grueneinsel/Arbonotate/blob/main/README.md)
          files: dist/Arbonotate_${{ steps.meta.outputs.date }}.html
          draft: false
          prerelease: false
